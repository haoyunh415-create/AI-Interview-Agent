# ── Tech Chat — Nginx Development Configuration ──
# HTTP-only, no TLS.  For local development and testing.

upstream backend {
    server tech-chat-backend:8765;
}

server {
    listen 80;
    server_name localhost;

    # ── Security headers (same as production) ──
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── API proxy ──
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE support (no buffering)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Frontend static files ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Service-Worker-Allowed /;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Service worker ──
    location /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed /;
    }

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               image/svg+xml text/markdown;
    gzip_min_length 1000;
    gzip_vary on;

    # ── Logging ──
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
