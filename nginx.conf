# ── Tech Chat — Nginx Production Configuration ──
# Unified entry point: TLS termination, static file serving, API proxy.
#
# Usage:
#   1. docker compose up -d nginx    (uses this config)
#   2. Or standalone:  docker run -p 80:80 -p 443:443 nginx:alpine
#
# For TLS: place your .pem / .key in ./certs/

upstream backend {
    server tech-chat-backend:8765;
}

server {
    listen 80;
    server_name localhost;

    # ── Redirect HTTP → HTTPS (production) ──
    # Comment out if running without TLS (development)
    location / {
        return 301 https://$host$request_uri;
    }

    # ── ACME challenge (Let's Encrypt) ──
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    server_name localhost;

    # ── TLS (self-signed for dev; use Let's Encrypt in production) ──
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API proxy ──
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (no buffering)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # CORS handled by backend
    }

    # ── Frontend static files ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # PWA service worker
        add_header Service-Worker-Allowed /;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Service worker (no cache) ──
    location /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed /;
    }

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               image/svg+xml text/markdown;
    gzip_min_length 1000;
    gzip_vary on;

    # ── Logging ──
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
